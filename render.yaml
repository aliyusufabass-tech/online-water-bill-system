services:
  - type: web
    name: online-water-bill-api
    env: python
    plan: free
    rootDir: waterbill
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py create_admin
    startCommand: gunicorn waterbill.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: online-water-bill-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,online-water-bill-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://online-water-bill-system.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://online-water-bill-system.vercel.app"
      - key: ADMIN_USERNAME
        value: "JITUNENE"
      - key: ADMIN_EMAIL
        value: "aliyusufabass@gmail.com"
      - key: ADMIN_PASSWORD
        value: "Yusuf@24"

databases:
  - name: online-water-bill-db
    plan: free
    databaseName: online_water_bill
    user: online_water_bill
